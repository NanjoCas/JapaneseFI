<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Furigana Injector 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .content {
      padding: 30px;
    }
    
    .section {
      margin-bottom: 30px;
    }
    
    .section h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .whitelist-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .whitelist-item {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .whitelist-item input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
    }
    
    .whitelist-item label {
      cursor: pointer;
      flex: 1;
    }
    
    .add-domain {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .add-domain input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .add-domain button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }
    
    .add-domain button:hover {
      background: #5568d3;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
    }
    
    .button-group button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-save {
      background: #667eea;
      color: white;
    }
    
    .btn-save:hover {
      background: #5568d3;
    }
    
    .btn-reset {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-reset:hover {
      background: #e0e0e0;
    }
    
    .status-message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
    }
    
    .status-message.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    
    .info-box {
      background: #f5f5f5;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    .quick-settings {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .quick-settings h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .setting-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .setting-item:hover {
      border-color: #667eea;
      background: #f5f7ff;
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .setting-item-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .setting-item-label {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Furigana Injector</h1>
      <p>日语汉字读音标注设置</p>
    </header>
    
    <div class="content">
      <div id="status" class="status-message"></div>
      
      <div class="quick-settings">
        <h3>⚡ 常用设置</h3>
        <div class="settings-grid">
          <div class="setting-item" onclick="scrollToSection('whitelist')">
            <div class="setting-item-icon">📋</div>
            <div class="setting-item-label">网站白名单</div>
          </div>
          <div class="setting-item" onclick="toggleAllWhitelist(true)">
            <div class="setting-item-icon">✅</div>
            <div class="setting-item-label">启用全部网站</div>
          </div>
          <div class="setting-item" onclick="toggleAllWhitelist(false)">
            <div class="setting-item-icon">❌</div>
            <div class="setting-item-label">禁用全部网站</div>
          </div>
          <div class="setting-item" onclick="resetToDefault()">
            <div class="setting-item-icon">🔄</div>
            <div class="setting-item-label">恢复默认设置</div>
          </div>
        </div>
      </div>
      
      <div class="section" id="whitelist">
        <h2>📋 网站白名单</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 15px;">
          选择插件在哪些网站上工作。仅在白名单中的网站上，汉字才会自动显示读音。
        </p>
        
        <div class="whitelist-items" id="whitelistContainer"></div>
        
        <div class="add-domain">
          <input 
            type="text" 
            id="newDomain" 
            placeholder="例：example.com" 
            autocomplete="off"
          >
          <button onclick="addDomain()">添加</button>
        </div>
        
        <div class="info-box">
          ℹ️ 支持子域名自动匹配。例如添加 "example.com" 后，所有 "*.example.com" 的子域名也会被启用。
        </div>
      </div>
      
      <div class="button-group">
        <button class="btn-save" onclick="saveSettings()">💾 保存设置</button>
        <button class="btn-reset" onclick="resetToDefault()">🔄 恢复默认</button>
      </div>
    </div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
